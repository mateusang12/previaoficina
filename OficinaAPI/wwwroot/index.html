<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina Mecânica - Login Admin</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="login-container">
        <form id="loginForm" class="login-form">
            <h2>Oficina Mecânica</h2>
            <h3>Acesso Administrativo</h3>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="admin@oficina.com">
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">Entrar</button>
            <p id="mensagemErro" class="error-message"></p>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
